name: sentiql

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentiql
      POSTGRES_USER: sentiql
      POSTGRES_PASSWORD: sentiql
    ports:
      - "5432:5432"
    volumes:
      - sentiql_postgres_data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro

volumes:
  sentiql_postgres_data:
