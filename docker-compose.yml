name: sentiql

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentiql
      POSTGRES_USER: sentiql_bootstrap
      POSTGRES_PASSWORD: sentiql_bootstrap
      # SentiQL connects with the non-owner, RLS-enforced application role.
      POSTGRES_URL: postgresql://sentiql_app:sentiql_app@postgres:5432/sentiql
    ports:
      - "5432:5432"
    volumes:
      - sentiql_postgres_data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro

volumes:
  sentiql_postgres_data:
